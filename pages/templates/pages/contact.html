{% extends 'base.html' %}
{% block title %}Contact — TEEBUSINESS{% endblock %}
{% block content %}
{% include 'includes/hero_banner.html' with title="Contact" hide_subtitle=True variant="compact" %}
<section class="premium-content">
<div class="mx-auto max-w-xl px-4 py-12">
    <form class="premium-panel p-6">
        <div class="grid gap-4">
            <input class="rounded-lg border border-luxury-line bg-white/90 px-4 py-3 text-sm outline-none focus:border-luxury-black" placeholder="Name">
            <input class="rounded-lg border border-luxury-line bg-white/90 px-4 py-3 text-sm outline-none focus:border-luxury-black" type="email" placeholder="Email">
            <textarea class="rounded-lg border border-luxury-line bg-white/90 px-4 py-3 text-sm outline-none focus:border-luxury-black" rows="5" placeholder="Message"></textarea>
            <button type="button" class="btn-luxury">Send Message</button>
        </div>
    </form>
</div>
</section>
{% endblock %}
