{% extends 'base.html' %}

{% block title %}Shopping Cart - TEEBUSINESS{% endblock %}

{% block content %}
<section class="py-16 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-4xl font-bold text-center mb-8">Shopping Cart</h1>
        
        <div class="max-w-3xl mx-auto">
            <div class="bg-gray-50 p-8 rounded-lg">
                <p class="text-gray-600">Your cart is currently empty.</p>
                <a href="{% url 'catalog' %}" class="inline-block mt-4 bg-black text-white px-6 py-3 rounded-full font-bold hover:bg-gray-800 transition">
                    Continue Shopping
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
