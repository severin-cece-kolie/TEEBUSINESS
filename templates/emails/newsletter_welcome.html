<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to {{ business_name }}</title>
</head>
<body style="margin:0;padding:0;background:#f6f5f2;font-family:Arial,Helvetica,sans-serif;color:#0a0a0a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f5f2;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border:1px solid #e8e4dc;">
          <tr>
            <td style="background:#0a0a0a;padding:22px 32px;">
              <span style="color:#ffffff;font-size:18px;font-weight:bold;letter-spacing:4px;text-transform:uppercase;">{{ business_name }}</span>
            </td>
          </tr>
          <tr>
            <td style="padding:36px 32px 8px;">
              <p style="margin:0 0 8px;font-size:11px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;color:#77736c;">You’re on the list</p>
              <h1 style="margin:0 0 14px;font-size:28px;line-height:1.2;font-weight:800;text-transform:uppercase;">Welcome to the club.</h1>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.7;color:#444;">
                Thanks for subscribing. You’ll be the first to know about new arrivals,
                restocks, exclusive offers and limited releases.
              </p>
              <a href="{{ shop_url }}" style="display:inline-block;background:#0a0a0a;color:#ffffff;text-decoration:none;font-size:13px;font-weight:bold;letter-spacing:1.5px;text-transform:uppercase;padding:14px 32px;border-radius:8px;">Start shopping</a>
            </td>
          </tr>
          <tr>
            <td style="border-top:1px solid #e8e4dc;padding:22px 32px;margin-top:24px;">
              <p style="margin:0;font-size:12px;line-height:1.6;color:#9a9a9a;">
                © {{ business_name }}. <a href="{{ site_url }}" style="color:#77736c;">Visit our store</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
