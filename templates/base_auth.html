{% load static %}
<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TEEBUSINESS{% endblock %}</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'auth-red': '#a23b32',
              'auth-red-dark': '#8a3029',
            },
            fontFamily: {
              'poppins': ['Poppins', 'sans-serif'],
              'inter': ['Inter', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <style>
      :root { --auth-red: #a23b32; }

      .auth-bg {
        position: fixed; inset: 0;
        background-image: url("{% static 'assets/images/background1.jpg' %}");
        background-size: cover; background-position: center;
        filter: blur(9px) saturate(1.05);
        transform: scale(1.12);            /* hide blurred edges */
        z-index: 0;
      }
      /* Warm beige/cream tint so the palette matches the mockup */
      .auth-tint {
        position: fixed; inset: 0; z-index: 1;
        background:
          linear-gradient(135deg, rgba(214,196,176,0.45) 0%, rgba(150,120,98,0.40) 55%, rgba(90,70,58,0.55) 100%);
      }

      /* Glassmorphism card */
      .auth-card {
        background: rgba(255,255,255,0.18);
        backdrop-filter: blur(22px) saturate(1.2);
        -webkit-backdrop-filter: blur(22px) saturate(1.2);
        border: 1px solid rgba(255,255,255,0.45);
        box-shadow: 0 10px 45px rgba(60,40,30,0.30);
      }

      /* Modern inputs (applies to every auth field, regardless of widget classes) */
      .auth-card input[type="text"],
      .auth-card input[type="email"],
      .auth-card input[type="password"],
      .auth-card input[type="tel"],
      .auth-card input[type="number"] {
        width: 100%;
        background: #ffffff;
        border: 1px solid rgba(255,255,255,0.7);
        border-radius: 14px;
        padding: 14px 18px;
        font-size: 15px;
        color: #3a2f2a;
        outline: none;
        box-shadow: 0 3px 12px rgba(60,40,30,0.12);
        transition: box-shadow .2s ease, border-color .2s ease;
      }
      .auth-card input::placeholder { color: #a99c91; }
      .auth-card input:focus {
        border-color: var(--auth-red);
        box-shadow: 0 0 0 3px rgba(162,59,50,0.18), 0 3px 12px rgba(60,40,30,0.12);
      }
      /* Keep autofill on-brand (white, not blue) */
      .auth-card input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 1000px #fff inset;
        -webkit-text-fill-color: #3a2f2a;
      }

      .auth-btn {
        width: 100%; border: none; cursor: pointer;
        background: var(--auth-red); color: #fff;
        border-radius: 14px; padding: 14px; font-weight: 600; font-size: 15px;
        box-shadow: 0 6px 18px rgba(162,59,50,0.35);
        transition: transform .15s ease, background .2s ease, box-shadow .2s ease;
      }
      .auth-btn:hover { background: var(--auth-red-dark); box-shadow: 0 8px 22px rgba(138,48,41,0.45); }
      .auth-btn:active { transform: scale(.985); }
      .auth-btn:disabled { opacity: .55; cursor: not-allowed; }

      @keyframes auth-rise { from { opacity: 0; transform: translateY(24px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
      .auth-rise { animation: auth-rise .7s cubic-bezier(.22,.61,.36,1) both; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="font-inter text-[#3a2f2a]">
  <div class="auth-bg"></div>
  <div class="auth-tint"></div>

  <main class="relative z-10 flex min-h-screen items-center justify-center p-4 sm:p-6">
    <div class="auth-card auth-rise w-full max-w-md rounded-[28px] px-6 py-9 sm:px-10 sm:py-11">
      <div class="mx-auto mb-6 h-24 w-24 overflow-hidden rounded-full bg-white shadow-md ring-1 ring-white/60 sm:h-28 sm:w-28">
        <img src="{% static 'assets/images/logo.png' %}" alt="TEEBUSINESS"
             class="h-full w-full scale-[1.2] object-contain object-center">
      </div>
      {% block form_panel %}{% endblock %}
      <a href="{% url 'home' %}"
         class="mt-6 block text-center text-sm font-medium text-[#6b5a50] transition hover:text-auth-red">
        Continuer sans se connecter →
      </a>
    </div>
  </main>

  <script>
    // Optional show/hide password toggle (used where a .pw-wrap is present)
    function togglePassword(btn) {
      var input = btn.closest('.pw-wrap').querySelector('input');
      var showing = input.getAttribute('type') === 'text';
      input.setAttribute('type', showing ? 'password' : 'text');
    }
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
