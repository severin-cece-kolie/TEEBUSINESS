{% load static %}
<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TEEBUSINESS{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'luxury-black': '#0a0a0a',
              'luxury-grey': '#f6f5f2',
              'luxury-mid': '#77736c',
              'luxury-line': '#e8e4dc',
            },
            fontFamily: {
              'barlow': ['Barlow', 'sans-serif'],
              'inter': ['Inter', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <link rel="stylesheet" href="{% static 'css/premium.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="font-inter text-luxury-black antialiased">
    {% block auth_content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
