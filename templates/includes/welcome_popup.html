{% load static %}
<div 
    x-data="welcomePopup()" 
    x-init="init()"
    x-show="isOpen" 
    class="fixed inset-0 z-[100] flex items-center justify-center px-4" 
    style="display: none;"
>
    <!-- Overlay -->
    <div 
        x-show="isOpen" 
        x-transition.opacity.duration.500ms
        @click="close()"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm"
    ></div>

    <!-- Modal -->
    <div 
        x-show="isOpen" 
        x-transition:enter="transition ease-out duration-500" 
        x-transition:enter-start="opacity-0 translate-y-8 scale-95" 
        x-transition:enter-end="opacity-100 translate-y-0 scale-100" 
        x-transition:leave="transition ease-in duration-300" 
        x-transition:leave-start="opacity-100 translate-y-0 scale-100" 
        x-transition:leave-end="opacity-0 translate-y-8 scale-95" 
        class="relative mx-auto w-full max-w-md overflow-hidden rounded-2xl bg-white shadow-2xl"
    >
        <!-- Close button -->
        <button 
            @click="close()" 
            class="absolute right-4 top-4 z-10 flex h-8 w-8 items-center justify-center rounded-full bg-luxury-grey text-luxury-black transition-colors hover:bg-black hover:text-white"
        >
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <div class="px-8 py-10 text-center sm:px-10 sm:py-12">
            <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-luxury-grey">
                <img src="{% static 'assets/images/logo.png' %}" alt="TEEBUSINESS" class="h-8 w-8 object-contain">
            </div>
            
            <h2 class="mb-2 font-barlow text-2xl font-black uppercase tracking-widest text-luxury-black">Join The Community</h2>
            <h3 class="mb-8 font-barlow text-lg font-bold uppercase tracking-widest text-luxury-mid">TEEBUSINESS</h3>
            <p class="mb-8 text-sm text-luxury-mid">Get exclusive access to our next drop.</p>

            <form @submit.prevent="submitPopup" class="text-left">
                {% csrf_token %}
                <div class="mb-4">
                    <input 
                        type="text" 
                        x-model="fullName"
                        placeholder="Full Name" 
                        class="w-full rounded-xl border border-luxury-line bg-luxury-grey/50 px-4 py-3 text-sm outline-none transition-colors focus:border-luxury-black"
                        required
                    >
                </div>
                <div class="mb-6">
                    <input 
                        type="email" 
                        x-model="email"
                        placeholder="Email Address" 
                        class="w-full rounded-xl border border-luxury-line bg-luxury-grey/50 px-4 py-3 text-sm outline-none transition-colors focus:border-luxury-black"
                        required
                    >
                </div>

                <div x-show="message" x-transition class="mb-4 text-center text-xs font-medium" :class="status === 'success' ? 'text-green-600' : 'text-red-500'" x-text="message" style="display: none;"></div>

                <button 
                    type="submit" 
                    :disabled="loading"
                    class="flex w-full items-center justify-center rounded-xl bg-luxury-black px-4 py-3.5 text-xs font-bold uppercase tracking-widest text-white transition-colors hover:bg-black/90 disabled:opacity-70"
                >
                    <span x-show="!loading">Sign Up</span>
                    <svg x-show="loading" class="h-4 w-4 animate-spin text-white" style="display: none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </form>
            
            <button @click="close()" class="mt-6 text-xs text-luxury-mid underline transition-colors hover:text-luxury-black">No thanks, I'll just browse</button>
        </div>
    </div>
</div>

<script>
function welcomePopup() {
    return {
        isOpen: false,
        fullName: '',
        email: '',
        loading: false,
        message: '',
        status: '',
        
        init() {
            // Check if seen before
            const hasSeenPopup = localStorage.getItem('tee_popup_seen');
            
            if (!hasSeenPopup) {
                // Determine if this is the absolute first request of the session, or wait a bit to show
                setTimeout(() => {
                    this.isOpen = true;
                }, 2000); // 2 second delay so it doesn't jarringly block the initial load
            }
        },
        
        close() {
            this.isOpen = false;
            // Mark as seen so it doesn't show again
            localStorage.setItem('tee_popup_seen', 'true');
        },
        
        async submitPopup() {
            if (!this.email) return;
            
            this.loading = true;
            this.message = '';
            
            const payload = {
                source: 'Welcome Popup',
                full_name: this.fullName,
                email: this.email,
            };
            
            try {
                const response = await fetch('{% url "newsletter_subscribe" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('form [name=csrfmiddlewaretoken]').value
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                this.status = data.status;
                this.message = data.message;
                
                if (data.status === 'success') {
                    // Success! Close after 2 seconds
                    setTimeout(() => {
                        this.close();
                    }, 2000);
                }
            } catch (error) {
                this.status = 'error';
                this.message = 'An error occurred. Please try again.';
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
