{% load static %}
{# Floating WhatsApp support widget — FAB + expandable chat popup (WhatsApp Business style). #}
<div
  x-data="whatsappWidget({% if request.user.is_authenticated %}false{% else %}true{% endif %})"
  x-init="init()"
  class="fixed bottom-5 right-5 z-[95] flex flex-col items-end md:bottom-6 md:right-6"
>
  <!-- Expandable chat popup -->
  <div
    x-show="open"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-y-4 scale-95"
    x-transition:enter-end="opacity-100 translate-y-0 scale-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 translate-y-0 scale-100"
    x-transition:leave-end="opacity-0 translate-y-4 scale-95"
    @keydown.escape.window="open = false"
    role="dialog"
    aria-label="Chat with {{ business_name }} on WhatsApp"
    class="mb-3 w-[calc(100vw-2.5rem)] max-w-[360px] origin-bottom-right overflow-hidden rounded-2xl bg-white shadow-2xl ring-1 ring-black/5"
    style="display:none;"
  >
    <!-- Header: logo + name + online status -->
    <div class="flex items-center gap-3 bg-gradient-to-r from-[#075E54] to-[#128C7E] px-4 py-3.5 text-white">
      <div class="relative flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-white/15 ring-2 ring-white/25">
        <img src="{% static 'assets/images/logo.png' %}" alt="{{ business_name }}" class="h-7 w-7 object-contain">
        <span class="absolute -bottom-0.5 -right-0.5 h-3 w-3 rounded-full border-2 border-[#0c7a6e] bg-[#25D366]"></span>
      </div>
      <div class="min-w-0 flex-1">
        <p class="truncate text-sm font-bold leading-tight">{{ business_name }}</p>
        <p class="flex items-center gap-1.5 text-[11px] leading-tight text-white/80">
          <span class="inline-block h-1.5 w-1.5 rounded-full bg-[#25D366]"></span>
          Online · Typically replies instantly
        </p>
      </div>
      <button type="button" @click="close()" aria-label="Close chat"
              class="-mr-1 flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-white/80 transition-colors hover:bg-white/15 hover:text-white">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Chat body: welcome message bubble -->
    <div class="px-4 py-5"
         style="background-color:#efeae2;background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,0.035) 1px, transparent 0);background-size:18px 18px;">
      <div class="max-w-[88%] rounded-2xl rounded-tl-sm bg-white px-3.5 py-2.5 shadow-sm">
        <p class="text-[13px] font-bold text-[#075E54]">{{ business_name }}</p>
        <p class="mt-0.5 text-sm leading-snug text-luxury-black">
          👋 Hi there! Welcome to {{ business_name }}. How can we help you today?
        </p>
        <span class="mt-1 block text-right text-[10px] text-luxury-mid" x-text="time"></span>
      </div>
    </div>

    <!-- Footer: input + send -->
    <form @submit.prevent="send()" class="flex items-center gap-2 border-t border-luxury-line bg-white px-3 py-3">
      <input
        type="text"
        x-model="message"
        @keydown.enter.prevent="send()"
        placeholder="Type a message…"
        aria-label="Your message"
        autocomplete="off"
        class="min-w-0 flex-1 rounded-full border border-luxury-line bg-luxury-grey/60 px-4 py-2.5 text-sm outline-none transition-colors focus:border-[#25D366] focus:bg-white"
      >
      <button type="submit" aria-label="Send on WhatsApp"
              class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-[#25D366] text-white shadow-md transition-transform duration-200 hover:scale-105 active:scale-95">
        <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .65.65 1.13 1.39.91z"/></svg>
      </button>
    </form>
  </div>

  <!-- Floating action button -->
  <button
    type="button"
    @click="toggle()"
    :aria-expanded="open"
    aria-label="{{ whatsapp_tooltip }}"
    class="group relative flex h-14 w-14 items-center justify-center rounded-full bg-white shadow-xl ring-1 ring-black/5 transition-transform duration-300 hover:scale-110"
  >
    <span x-show="!open" class="absolute inline-flex h-full w-full animate-ping rounded-full bg-[#25D366] opacity-40"></span>
    <!-- WhatsApp icon (shown when closed) -->
    <img x-show="!open" src="{% static 'assets/images/whatsapp.png' %}" alt="WhatsApp"
         class="relative h-9 w-9 object-contain sm:h-10 sm:w-10">
    <!-- Chevron-down (shown when open) -->
    <svg x-show="open" class="relative h-6 w-6 text-[#075E54]" style="display:none;" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>
</div>

<script>
function whatsappWidget(isGuest) {
  return {
    open: false,
    message: '',
    isGuest: isGuest,
    time: '',
    redirectUrl: '{% url "whatsapp_redirect" %}',
    storageKey: 'tee_wa_widget_dismissed',

    init() {
      // Timestamp for the welcome bubble.
      try {
        this.time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch (e) { this.time = ''; }

      // Auto-open only for unauthenticated visitors who have never dismissed it.
      // The delay (3.5–5s) + corner placement keeps it non-intrusive.
      if (this.isGuest && !this.isDismissed()) {
        const delay = 3500 + Math.floor(Math.random() * 1500);
        setTimeout(() => {
          if (!this.isDismissed()) this.open = true;
        }, delay);
      }
    },

    isDismissed() {
      try { return localStorage.getItem(this.storageKey) === '1'; }
      catch (e) { return false; }
    },

    toggle() {
      this.open = !this.open;
    },

    // Permanent dismissal: never auto-opens again. The button still reopens it manually.
    close() {
      this.open = false;
      try { localStorage.setItem(this.storageKey, '1'); } catch (e) {}
    },

    // Hand off to the backend WhatsApp redirect with the typed message prefilled.
    send() {
      const text = this.message.trim();
      const url = text ? this.redirectUrl + '?text=' + encodeURIComponent(text) : this.redirectUrl;
      window.open(url, '_blank', 'noopener');
      this.message = '';
    }
  };
}
</script>
