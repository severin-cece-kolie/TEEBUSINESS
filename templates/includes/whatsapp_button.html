{# Floating WhatsApp support button — visible on desktop and mobile. #}
<a href="{{ whatsapp_url }}" target="_blank" rel="noopener noreferrer"
   aria-label="{{ whatsapp_tooltip }}"
   class="group fixed bottom-5 right-5 z-[90] flex items-center gap-3 md:bottom-6 md:right-6">
  <!-- Tooltip (desktop) -->
  <span class="pointer-events-none hidden translate-x-2 rounded-lg bg-luxury-black px-3 py-2 text-xs font-semibold text-white opacity-0 shadow-lg transition-all duration-300 group-hover:translate-x-0 group-hover:opacity-100 md:block">
    {{ whatsapp_tooltip }}
  </span>
  <!-- Button -->
  <span class="relative flex h-14 w-14 items-center justify-center rounded-full bg-[#25D366] text-white shadow-xl transition-transform duration-300 hover:scale-110">
    <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-[#25D366] opacity-60"></span>
    <svg class="relative h-7 w-7" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">

  </span>
</a>
