{# Compact footer newsletter — rendered once, inside the site footer. #}
<div class="border-b border-luxury-line/70 pb-8 md:pb-10">
  <div class="mx-auto grid max-w-7xl gap-6 px-3 sm:px-6 md:grid-cols-2 md:items-center md:gap-10 lg:px-8">
    <div>
      <h3 class="font-barlow text-lg font-black uppercase tracking-[0.18em] text-luxury-black md:text-xl">Sign Up For Discounts &amp; Updates</h3>
      <p class="mt-2 max-w-md text-sm leading-6 text-luxury-mid">Get notified about new arrivals, promotions, restocks and exclusive offers.</p>
    </div>

    <form x-data="newsletterForm()" @submit.prevent="submit" class="w-full">
      {% csrf_token %}
      <div class="flex flex-col gap-3 sm:flex-row sm:gap-0">
        <label for="footer-newsletter" class="sr-only">Email or phone number</label>
        <input
          id="footer-newsletter"
          type="text"
          x-model="contactValue"
          name="contact"
          placeholder="Email or Phone Number"
          class="w-full rounded-full border border-luxury-line bg-white px-5 py-3.5 text-sm outline-none transition-colors focus:border-luxury-black sm:rounded-r-none"
          required
        >
        <button
          type="submit"
          :disabled="loading"
          class="flex min-w-[150px] items-center justify-center rounded-full bg-luxury-black px-6 py-3.5 text-xs font-bold uppercase tracking-widest text-white transition-colors hover:bg-black/90 disabled:opacity-70 sm:rounded-l-none"
        >
          <span x-show="!loading">Subscribe</span>
          <svg x-show="loading" class="h-4 w-4 animate-spin text-white" style="display:none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
      </div>
      <p x-show="message" x-transition class="mt-3 text-xs font-medium" :class="status === 'success' ? 'text-green-600' : 'text-red-500'" x-text="message" style="display:none;"></p>
    </form>
  </div>
</div>

<script>
function newsletterForm() {
    return {
        contactValue: '',
        loading: false,
        message: '',
        status: '',
        async submit() {
            if (!this.contactValue) return;
            this.loading = true;
            this.message = '';
            const isEmail = this.contactValue.includes('@');
            const payload = {
                source: 'website',
                email: isEmail ? this.contactValue.trim() : '',
                phone: !isEmail ? this.contactValue.trim() : '',
            };
            try {
                const response = await fetch('{% url "newsletter_subscribe" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                this.status = data.status;
                this.message = data.message;
                if (data.status === 'success') this.contactValue = '';
            } catch (error) {
                this.status = 'error';
                this.message = 'Something went wrong. Please try again.';
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
