<section class="border-t border-luxury-line bg-white py-12 md:py-20">
    <div class="mx-auto max-w-7xl px-4 text-center sm:px-6 lg:px-8">
        <div class="mx-auto max-w-2xl">
            <h2 class="mb-3 font-barlow text-xl font-black uppercase tracking-widest text-luxury-black md:text-3xl">Sign Up For Discounts &amp; Updates</h2>
            <p class="mb-8 text-sm text-luxury-mid md:text-base">Get notified about new arrivals, restocks, exclusive offers and limited releases.</p>
            
            <form x-data="newsletterForm()" @submit.prevent="submit" class="relative mx-auto max-w-md">
                {% csrf_token %}
                <div class="flex flex-col gap-3 sm:flex-row sm:gap-0">
                    <input 
                        type="text" 
                        x-model="contactValue"
                        name="contact" 
                        placeholder="Phone Number OR Email Address" 
                        class="w-full rounded-full border border-luxury-line bg-luxury-grey/50 px-6 py-3.5 text-sm outline-none transition-colors focus:border-luxury-black sm:rounded-r-none"
                        required
                    >
                    <button 
                        type="submit" 
                        :disabled="loading"
                        class="flex min-w-[140px] items-center justify-center rounded-full bg-luxury-black px-6 py-3.5 text-xs font-bold uppercase tracking-widest text-white transition-colors hover:bg-black/90 disabled:opacity-70 sm:rounded-l-none"
                    >
                        <span x-show="!loading">Subscribe</span>
                        <svg x-show="loading" class="h-4 w-4 animate-spin text-white" style="display: none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </button>
                </div>
                
                <div x-show="message" x-transition class="mt-4 text-xs font-medium" :class="status === 'success' ? 'text-green-600' : 'text-red-500'" x-text="message" style="display: none;"></div>
            </form>
        </div>
    </div>
</section>

<script>
function newsletterForm() {
    return {
        contactValue: '',
        loading: false,
        message: '',
        status: '',
        
        async submit() {
            if (!this.contactValue) return;
            
            this.loading = true;
            this.message = '';
            
            // Determine if email or phone based on @ symbol
            const isEmail = this.contactValue.includes('@');
            const payload = {
                source: 'Footer Form',
                email: isEmail ? this.contactValue : '',
                phone: !isEmail ? this.contactValue : '',
            };
            
            try {
                const response = await fetch('{% url "newsletter_subscribe" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                this.status = data.status;
                this.message = data.message;
                
                if (data.status === 'success') {
                    this.contactValue = ''; // clear form
                }
            } catch (error) {
                this.status = 'error';
                this.message = 'An error occurred. Please try again.';
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
