{% extends 'base_auth.html' %}

{% block title %}Login - TEEBUSINESS{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Sign in to your account
            </h2>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="rounded-md p-4 {% if message.tags == 'error' %}bg-red-50{% elif message.tags == 'success' %}bg-green-50{% else %}bg-blue-50{% endif %}">
                    <p class="text-sm font-medium {% if message.tags == 'error' %}text-red-800{% elif message.tags == 'success' %}text-green-800{% else %}text-blue-800{% endif %}">
                        {{ message }}
                    </p>
                </div>
            {% endfor %}
        {% endif %}
        
        <form class="mt-8 space-y-6" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black">
                    Sign in
                </button>
            </div>
        </form>
        
        <div class="text-center">
            <p class="text-sm text-gray-600">
                Don't have an account? 
                <a href="{% url 'register' %}" class="font-medium text-black hover:text-gray-800">
                    Sign up
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
