{% extends 'base.html' %}

{% block title %}Profile - TEEBUSINESS{% endblock %}

{% block content %}
<section class="py-16 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-4xl font-bold text-center mb-8">Profile Settings</h1>
        
        <div class="max-w-3xl mx-auto">
            <div class="bg-gray-50 p-8 rounded-lg">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="bg-black text-white px-6 py-3 rounded-full font-bold hover:bg-gray-800 transition">
                        Update Profile
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
